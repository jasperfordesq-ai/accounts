name: Scheduled Security Audit

on:
  schedule:
    - cron: "31 4 * * 1"
  workflow_dispatch:
    inputs:
      candidate_commit_sha:
        description: Exact protected-main commit to audit
        required: true
        type: string

permissions:
  contents: read

jobs:
  dependency-and-container-audit:
    name: Dependency and Container Audit
    runs-on: ubuntu-latest
    env:
      EVIDENCE_DIR: /tmp/scheduled-security-audit-${{ github.run_id }}
      CANDIDATE_SHA: ${{ inputs.candidate_commit_sha || github.sha }}
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ inputs.candidate_commit_sha || github.sha }}

      - name: Bind audit to the exact protected-main workflow commit
        shell: bash
        run: |
          set -euo pipefail
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "Candidate SHA must be 40 lowercase hexadecimal characters." >&2; exit 1; }
          [[ "$GITHUB_SHA" == "$CANDIDATE_SHA" ]] || { echo "Candidate SHA must equal the workflow commit SHA." >&2; exit 1; }
          [[ "$(git rev-parse HEAD)" == "$CANDIDATE_SHA" ]] || { echo "Checked-out commit does not match the candidate SHA." >&2; exit 1; }
          [[ "$GITHUB_REF" == "refs/heads/main" ]] || { echo "Security audit must run from protected main." >&2; exit 1; }
          [[ "$GITHUB_EVENT_NAME" == "schedule" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]] || { echo "Unsupported security-audit event." >&2; exit 1; }

      - name: Prepare evidence directory
        shell: bash
        run: mkdir -p "$EVIDENCE_DIR"

      - name: Set up exact Node runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Capture npm vulnerability evidence
        working-directory: frontend
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > "$EVIDENCE_DIR/npm-audit.json"
          audit_exit_code=$?
          set -e
          printf '%s\n' "$audit_exit_code" > "$EVIDENCE_DIR/npm-audit-exit-code.txt"

      - name: Set up exact .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore locked backend dependencies
        run: dotnet restore backend/Accounts.slnx --locked-mode

      - name: Capture NuGet vulnerability evidence
        shell: bash
        run: >-
          dotnet list backend/Accounts.slnx package --vulnerable --include-transitive --format json
          > "$EVIDENCE_DIR/nuget-vulnerabilities.json"

      - name: Verify reproducible build inputs
        run: node scripts/verify-build-inputs.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build backend audit image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.backend
          load: true
          push: false
          provenance: false
          tags: accounts-api-scheduled-audit:${{ github.run_id }}

      - name: Build frontend audit image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.frontend
          build-args: API_URL=http://api:8080
          load: true
          push: false
          provenance: false
          tags: accounts-frontend-scheduled-audit:${{ github.run_id }}

      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: accounts-api-scheduled-audit:${{ github.run_id }}
          format: json
          output: ${{ env.EVIDENCE_DIR }}/backend-trivy.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "0"

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: accounts-frontend-scheduled-audit:${{ github.run_id }}
          format: json
          output: ${{ env.EVIDENCE_DIR }}/frontend-trivy.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "0"

      - name: Generate backend SPDX SBOM
        uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0
        with:
          image: accounts-api-scheduled-audit:${{ github.run_id }}
          format: spdx-json
          output-file: ${{ env.EVIDENCE_DIR }}/backend-sbom.spdx.json
          upload-artifact: false

      - name: Generate frontend SPDX SBOM
        uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0
        with:
          image: accounts-frontend-scheduled-audit:${{ github.run_id }}
          format: spdx-json
          output-file: ${{ env.EVIDENCE_DIR }}/frontend-sbom.spdx.json
          upload-artifact: false

      - name: Enforce vulnerability policy and bind evidence hashes
        run: >-
          node scripts/verify-security-audit-report.mjs
          --npm "$EVIDENCE_DIR/npm-audit.json"
          --npm-exit-code "$EVIDENCE_DIR/npm-audit-exit-code.txt"
          --nuget "$EVIDENCE_DIR/nuget-vulnerabilities.json"
          --trivy "$EVIDENCE_DIR/backend-trivy.json"
          --trivy "$EVIDENCE_DIR/frontend-trivy.json"
          --sbom "$EVIDENCE_DIR/backend-sbom.spdx.json"
          --sbom "$EVIDENCE_DIR/frontend-sbom.spdx.json"
          --candidate-sha "$CANDIDATE_SHA"
          --workflow-sha "$GITHUB_SHA"
          --run-id "$GITHUB_RUN_ID"
          --run-attempt "$GITHUB_RUN_ATTEMPT"
          --run-url "$RUN_URL"
          --repository "$GITHUB_REPOSITORY"
          --event-name "$GITHUB_EVENT_NAME"
          --ref "$GITHUB_REF"
          --workflow-ref "$GITHUB_WORKFLOW_REF"
          --report "$EVIDENCE_DIR/scheduled-security-audit-report.json"

      - name: Retain scheduled security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scheduled-security-audit-${{ env.CANDIDATE_SHA }}-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 90
