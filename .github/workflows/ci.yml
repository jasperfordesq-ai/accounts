name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-hygiene:
    name: Workflow Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Validate CI action versions
        run: node scripts/verify-ci-actions.mjs

      - name: Validate reproducible build inputs
        run: node scripts/verify-build-inputs.mjs

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs:
      - workflow-hygiene
    services:
      # Real PostgreSQL so the audit-durability integration tests run instead of being skipped (BL-15).
      postgres:
        image: postgres:16.4
        env:
          POSTGRES_USER: accounts_test
          POSTGRES_PASSWORD: accounts_test
          POSTGRES_DB: accounts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U accounts_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore backend
        run: dotnet restore backend/Accounts.slnx --locked-mode

      - name: Restore pinned .NET tools
        run: dotnet tool restore

      - name: Build API
        run: dotnet build backend/Accounts.Api/Accounts.Api.csproj --configuration Release --no-restore

      - name: Reject generated OpenAPI contract drift
        run: git diff --exit-code -- backend/Accounts.Api/OpenApi/accounts-api-v1.json

      - name: Reject pending EF model changes
        run: >-
          dotnet ef migrations has-pending-model-changes
          --project backend/Accounts.Api/Accounts.Api.csproj
          --startup-project backend/Accounts.Api/Accounts.Api.csproj
          --configuration Release
          --no-build

      - name: Test backend
        run: dotnet test backend/Accounts.Tests/Accounts.Tests.csproj --configuration Release --no-restore
        env:
          # Enables the [PostgresFact] audit-durability tests (otherwise skipped on InMemory).
          ACCOUNTS_POSTGRES_TEST_CONNECTION: "Host=localhost;Port=5432;Database=accounts_test;Username=accounts_test;Password=accounts_test"

      - name: Run mandatory PostgreSQL golden corpus release gate
        run: >-
          dotnet test backend/Accounts.Tests/Accounts.Tests.csproj
          --configuration Release
          --no-restore
          --filter FullyQualifiedName~GoldenCorpusPostgresReleaseTests
        env:
          ACCOUNTS_POSTGRES_TEST_CONNECTION: "Host=localhost;Port=5432;Database=accounts_test;Username=accounts_test;Password=accounts_test"
          ACCOUNTS_REQUIRE_POSTGRES_GOLDEN_CORPUS: "true"

      - name: Run fresh and previous-release PostgreSQL migration gate
        run: >-
          dotnet test backend/Accounts.Tests/Accounts.Tests.csproj
          --configuration Release
          --no-restore
          --filter FullyQualifiedName~MigrationUpgradePostgresTests
        env:
          ACCOUNTS_POSTGRES_TEST_CONNECTION: "Host=localhost;Port=5432;Database=accounts_test;Username=accounts_test;Password=accounts_test"
          ACCOUNTS_MIGRATION_EVIDENCE_PATH: ${{ runner.temp }}/accounts-migration-upgrade/migration-upgrade-report.json
          ACCOUNTS_GITHUB_ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Verify migration upgrade evidence
        if: always()
        shell: pwsh
        run: |
          $evidenceDirectory = Join-Path $env:RUNNER_TEMP "accounts-migration-upgrade"
          New-Item -ItemType Directory -Path $evidenceDirectory -Force | Out-Null
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          ./scripts/verify-migration-upgrade-evidence.ps1 `
            -ReportPath (Join-Path $evidenceDirectory "migration-upgrade-report.json") `
            -ConfigurationPath "config/migration-gate.json" `
            -EvidencePath (Join-Path $evidenceDirectory "migration-upgrade-verification-report.json") `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl $runUrl
          Copy-Item -LiteralPath "config/migration-gate.json" -Destination $evidenceDirectory
          Copy-Item -LiteralPath ".config/dotnet-tools.json" -Destination $evidenceDirectory

      - name: Upload PostgreSQL migration upgrade evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: postgres-migration-upgrade-gate
          path: ${{ runner.temp }}/accounts-migration-upgrade
          if-no-files-found: error

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs:
      - workflow-hygiene
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies and write evidence
        shell: pwsh
        run: |
          $auditDir = Join-Path $env:RUNNER_TEMP "accounts-dependency-audit"
          New-Item -ItemType Directory -Force -Path $auditDir | Out-Null
          $auditPath = Join-Path $auditDir "npm-audit.json"
          npm audit --audit-level=moderate --json > $auditPath
          $auditExitCode = $LASTEXITCODE
          ../scripts/write-dependency-evidence.ps1 `
            -NpmAuditJsonPath $auditPath `
            -EvidencePath (Join-Path $auditDir "dependency-audit-report.json")
          if ($auditExitCode -ne 0) {
            exit $auditExitCode
          }

      - name: Upload dependency audit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dependency-audit-release
          path: ${{ runner.temp }}/accounts-dependency-audit
          if-no-files-found: ignore

      - name: Type-check frontend
        run: npx tsc --noEmit --incremental false

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend (unit + readiness/proxy/auth/api-client)
        run: npm test

      - name: Generate ephemeral frontend build API key
        shell: bash
        run: |
          set -euo pipefail

          accounts_api_key="$(head -c 48 /dev/urandom | base64 -w 0)"
          echo "::add-mask::$accounts_api_key"
          printf 'ACCOUNTS_API_KEY=%s\n' "$accounts_api_key" >> "$GITHUB_ENV"

      - name: Build frontend
        run: npm run build
        env:
          API_URL: http://api:8080

  production-config:
    name: Production Compose Config
    runs-on: ubuntu-latest
    needs:
      - workflow-hygiene
    env:
      POSTGRES_DB: accounts
      POSTGRES_USER: accounts
      ACCOUNTS_API_IMAGE: ghcr.io/example/accounts-api@sha256:1111111111111111111111111111111111111111111111111111111111111111
      ACCOUNTS_FRONTEND_IMAGE: ghcr.io/example/accounts-frontend@sha256:2222222222222222222222222222222222222222222222222222222222222222
      ACCOUNTS_ALLOWED_HOSTS: accounts-smoke.local
      ACCOUNTS_ALLOWED_ORIGIN: https://accounts-smoke.local
      TRUST_PROXY_HEADERS: "true"
      FRONTEND_PORT: "3000"
      NO_PROXY: accounts-smoke.local,127.0.0.1,localhost
      BOOTSTRAP_TENANT_NAME: CI Firm
      BOOTSTRAP_TENANT_SLUG: ci-firm
      BOOTSTRAP_OWNER_EMAIL: owner@example.ie
      BOOTSTRAP_OWNER_DISPLAY_NAME: CI Owner
      BOOTSTRAP_OWNER_MUST_CHANGE_PASSWORD: "false"
      MONITORING_ERROR_TRACKING_DSN: https://public@sentry.invalid/1
      MONITORING_ERROR_SMOKE_ENABLED: "true"
      MONITORING_TRACES_SAMPLE_RATE: "0"
      MONITORING_ON_CALL_OWNER: CI Operations Owner
      MONITORING_ALERT_ROUTE: ci-operations-alert-route
      MFA_ENCRYPTION_ACTIVE_KEY_ID: ci-mfa-primary
      DEADLINE_DELIVERY_PROVIDER_ENDPOINT: https://deadline-provider.invalid/reminders
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Generate ephemeral production config secrets
        shell: bash
        run: |
          set -euo pipefail

          generate_secret() {
            head -c 48 /dev/urandom | base64 -w 0
          }

          generate_bootstrap_owner_password() {
            printf 'CiOwner1!%s' "$(generate_secret)"
          }

          set_masked_env() {
            local name="$1"
            local value="$2"
            echo "::add-mask::$value"
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          }

          write_secret_file() {
            local env_name="$1"
            local file_name="$2"
            local value="$3"
            local path="$secrets_dir/$file_name"
            echo "::add-mask::$value"
            printf '%s' "$value" > "$path"
            chmod 0444 "$path"
            printf '%s=%s\n' "$env_name" "$path" >> "$GITHUB_ENV"
          }

          generate_postgres_tls() {
            local ca_key="$secrets_dir/postgres-ca.key"
            local ca_cert="$secrets_dir/postgres-ca.crt"
            local server_key="$secrets_dir/postgres-server.key"
            local server_csr="$secrets_dir/postgres-server.csr"
            local server_cert="$secrets_dir/postgres-server.crt"
            local extensions="$secrets_dir/postgres-server.ext"

            openssl req -x509 -newkey rsa:3072 -nodes -sha256 -days 2 \
              -subj "/CN=Accounts CI PostgreSQL CA" \
              -addext "basicConstraints=critical,CA:TRUE" \
              -addext "keyUsage=critical,keyCertSign,cRLSign" \
              -keyout "$ca_key" -out "$ca_cert" >/dev/null 2>&1
            openssl req -new -newkey rsa:3072 -nodes -sha256 \
              -subj "/CN=db" -keyout "$server_key" -out "$server_csr" >/dev/null 2>&1
            cat > "$extensions" <<'EOF'
          basicConstraints=critical,CA:FALSE
          keyUsage=critical,digitalSignature,keyEncipherment
          extendedKeyUsage=serverAuth
          subjectAltName=DNS:db
          EOF
            openssl x509 -req -sha256 -days 2 -in "$server_csr" \
              -CA "$ca_cert" -CAkey "$ca_key" -CAcreateserial \
              -extfile "$extensions" -out "$server_cert" >/dev/null 2>&1
            local backup_private_key="$secrets_dir/backup-decryption.key"
            local backup_certificate="$secrets_dir/backup-encryption.crt"
            openssl req -x509 -newkey rsa:3072 -nodes -sha256 -days 2 \
              -subj "/CN=Accounts CI Backup Encryption" \
              -addext "basicConstraints=critical,CA:FALSE" \
              -addext "keyUsage=critical,keyEncipherment,dataEncipherment" \
              -keyout "$backup_private_key" -out "$backup_certificate" >/dev/null 2>&1
            chmod 0600 "$ca_key" "$backup_private_key"
            chmod 0444 "$ca_cert" "$server_cert" "$server_key" "$backup_certificate"
            printf 'POSTGRES_SERVER_CERTIFICATE_FILE=%s\n' "$server_cert" >> "$GITHUB_ENV"
            printf 'POSTGRES_SERVER_KEY_FILE=%s\n' "$server_key" >> "$GITHUB_ENV"
            printf 'POSTGRES_CA_CERTIFICATE_FILE=%s\n' "$ca_cert" >> "$GITHUB_ENV"
            printf 'BACKUP_ENCRYPTION_CERTIFICATE_FILE=%s\n' "$backup_certificate" >> "$GITHUB_ENV"
            printf 'BACKUP_DECRYPTION_CERTIFICATE_FILE=%s\n' "$backup_certificate" >> "$GITHUB_ENV"
            printf 'BACKUP_DECRYPTION_PRIVATE_KEY_FILE=%s\n' "$backup_private_key" >> "$GITHUB_ENV"
          }

          secrets_dir="$RUNNER_TEMP/accounts-production-config-secrets"
          mkdir -p "$secrets_dir"
          chmod 700 "$secrets_dir"
          generate_postgres_tls

          postgres_password="$(generate_secret)"
          postgres_application_password="$(generate_secret)"
          accounts_api_key="$(generate_secret)"
          accounts_api_key_hash="$(printf '%s' "$accounts_api_key" | sha256sum | awk '{print $1}')"
          accounts_migration_connection_string="Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${postgres_password};SSL Mode=VerifyFull;Root Certificate=/run/secrets/postgres_ca_certificate;Trust Server Certificate=false"
          accounts_application_connection_string="Host=db;Port=5432;Database=${POSTGRES_DB};Username=accounts_api;Password=${postgres_application_password};SSL Mode=VerifyFull;Root Certificate=/run/secrets/postgres_ca_certificate;Trust Server Certificate=false"
          bootstrap_owner_password="$(generate_bootstrap_owner_password)"

          write_secret_file POSTGRES_PASSWORD_FILE postgres_password "$postgres_password"
          write_secret_file POSTGRES_APPLICATION_PASSWORD_FILE postgres_application_password "$postgres_application_password"
          write_secret_file ACCOUNTS_MIGRATION_CONNECTION_STRING_FILE accounts_migration_connection_string "$accounts_migration_connection_string"
          write_secret_file ACCOUNTS_APPLICATION_CONNECTION_STRING_FILE accounts_application_connection_string "$accounts_application_connection_string"
          write_secret_file AUTH_SESSION_SIGNING_KEY_FILE auth_session_signing_key "$(generate_secret)"
          write_secret_file AUDIT_INTEGRITY_SIGNING_KEY_FILE audit_integrity_signing_key "$(generate_secret)"
          write_secret_file DATABASE_TENANT_CONTEXT_KEY_FILE database_tenant_context_key "$(generate_secret)"
          write_secret_file IDENTITY_HMAC_KEY_FILE identity_hmac_key "$(generate_secret)"
          write_secret_file MFA_ENCRYPTION_KEY_FILE mfa_encryption_key "$(generate_secret | head -c 44)"
          write_secret_file DEADLINE_PROVIDER_TOKEN_FILE deadline_provider_token "$(generate_secret)"
          write_secret_file ACCOUNTS_API_KEY_FILE accounts_api_key "$accounts_api_key"
          write_secret_file BOOTSTRAP_OWNER_PASSWORD_FILE bootstrap_owner_password "$bootstrap_owner_password"
          set_masked_env ACCOUNTS_API_KEY_HASH "$accounts_api_key_hash"

          printf 'AUDIT_INTEGRITY_ACTIVE_KEY_ID=ci-audit-%s-%s\n' "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" >> "$GITHUB_ENV"

      - name: Validate production compose config
        run: docker compose -f compose.production.yml config --quiet

      - name: Validate production image contract
        shell: pwsh
        run: |
          ./scripts/verify-production-compose-images.ps1 `
            -EvidencePath (Join-Path $env:RUNNER_TEMP "accounts-production-safety/production-safety-report.json")

      - name: Upload production safety evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-safety-config
          path: ${{ runner.temp }}/accounts-production-safety/production-safety-report.json
          if-no-files-found: error

      - name: Validate Caddy ingress example
        run: >
          docker run --rm
          -v "${{ github.workspace }}/deploy/caddy/Caddyfile.example:/etc/caddy/Caddyfile:ro"
          -e ACCOUNTS_HOSTNAME=accounts.example.ie
          -e ACCOUNTS_FRONTEND_UPSTREAM=127.0.0.1:3000
          caddy:2@sha256:af5fdcd76f2db5e4e974ee92f96ee8c0fc3edb55bd4ba5032547cbf3f65e486d
          caddy validate --config /etc/caddy/Caddyfile

  production-smoke:
    name: Production Stack Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    needs:
      - backend
      - frontend
      - production-config
    env:
      POSTGRES_DB: accounts
      POSTGRES_USER: accounts
      ACCOUNTS_ALLOWED_HOSTS: accounts-smoke.local
      ACCOUNTS_ALLOWED_ORIGIN: https://accounts-smoke.local
      TRUST_PROXY_HEADERS: "true"
      FRONTEND_PORT: "3000"
      NO_PROXY: accounts-smoke.local,127.0.0.1,localhost
      BOOTSTRAP_TENANT_NAME: CI Firm
      BOOTSTRAP_TENANT_SLUG: ci-firm
      BOOTSTRAP_OWNER_EMAIL: owner@example.ie
      BOOTSTRAP_OWNER_DISPLAY_NAME: CI Owner
      BOOTSTRAP_OWNER_MUST_CHANGE_PASSWORD: "false"
      MONITORING_ERROR_TRACKING_DSN: https://public@sentry.invalid/1
      MONITORING_ERROR_SMOKE_ENABLED: "true"
      MONITORING_TRACES_SAMPLE_RATE: "0"
      MONITORING_ON_CALL_OWNER: CI Operations Owner
      MONITORING_ALERT_ROUTE: ci-operations-alert-route
      MFA_ENCRYPTION_ACTIVE_KEY_ID: ci-mfa-primary
      DEADLINE_DELIVERY_PROVIDER_ENDPOINT: https://deadline-provider.invalid/reminders
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Generate ephemeral production smoke secrets
        shell: bash
        run: |
          set -euo pipefail

          generate_secret() {
            head -c 48 /dev/urandom | base64 -w 0
          }

          generate_bootstrap_owner_password() {
            printf 'CiOwner1!%s' "$(generate_secret)"
          }

          set_masked_env() {
            local name="$1"
            local value="$2"
            echo "::add-mask::$value"
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          }

          write_secret_file() {
            local env_name="$1"
            local file_name="$2"
            local value="$3"
            local path="$secrets_dir/$file_name"
            echo "::add-mask::$value"
            printf '%s' "$value" > "$path"
            chmod 0444 "$path"
            printf '%s=%s\n' "$env_name" "$path" >> "$GITHUB_ENV"
          }

          generate_postgres_tls() {
            local ca_key="$secrets_dir/postgres-ca.key"
            local ca_cert="$secrets_dir/postgres-ca.crt"
            local server_key="$secrets_dir/postgres-server.key"
            local server_csr="$secrets_dir/postgres-server.csr"
            local server_cert="$secrets_dir/postgres-server.crt"
            local extensions="$secrets_dir/postgres-server.ext"

            openssl req -x509 -newkey rsa:3072 -nodes -sha256 -days 2 \
              -subj "/CN=Accounts CI PostgreSQL CA" \
              -addext "basicConstraints=critical,CA:TRUE" \
              -addext "keyUsage=critical,keyCertSign,cRLSign" \
              -keyout "$ca_key" -out "$ca_cert" >/dev/null 2>&1
            openssl req -new -newkey rsa:3072 -nodes -sha256 \
              -subj "/CN=db" -keyout "$server_key" -out "$server_csr" >/dev/null 2>&1
            cat > "$extensions" <<'EOF'
          basicConstraints=critical,CA:FALSE
          keyUsage=critical,digitalSignature,keyEncipherment
          extendedKeyUsage=serverAuth
          subjectAltName=DNS:db
          EOF
            openssl x509 -req -sha256 -days 2 -in "$server_csr" \
              -CA "$ca_cert" -CAkey "$ca_key" -CAcreateserial \
              -extfile "$extensions" -out "$server_cert" >/dev/null 2>&1
            local backup_private_key="$secrets_dir/backup-decryption.key"
            local backup_certificate="$secrets_dir/backup-encryption.crt"
            openssl req -x509 -newkey rsa:3072 -nodes -sha256 -days 2 \
              -subj "/CN=Accounts CI Backup Encryption" \
              -addext "basicConstraints=critical,CA:FALSE" \
              -addext "keyUsage=critical,keyEncipherment,dataEncipherment" \
              -keyout "$backup_private_key" -out "$backup_certificate" >/dev/null 2>&1
            chmod 0600 "$ca_key" "$backup_private_key"
            chmod 0444 "$ca_cert" "$server_cert" "$server_key" "$backup_certificate"
            printf 'POSTGRES_SERVER_CERTIFICATE_FILE=%s\n' "$server_cert" >> "$GITHUB_ENV"
            printf 'POSTGRES_SERVER_KEY_FILE=%s\n' "$server_key" >> "$GITHUB_ENV"
            printf 'POSTGRES_CA_CERTIFICATE_FILE=%s\n' "$ca_cert" >> "$GITHUB_ENV"
            printf 'BACKUP_ENCRYPTION_CERTIFICATE_FILE=%s\n' "$backup_certificate" >> "$GITHUB_ENV"
            printf 'BACKUP_DECRYPTION_CERTIFICATE_FILE=%s\n' "$backup_certificate" >> "$GITHUB_ENV"
            printf 'BACKUP_DECRYPTION_PRIVATE_KEY_FILE=%s\n' "$backup_private_key" >> "$GITHUB_ENV"
          }

          secrets_dir="$RUNNER_TEMP/accounts-production-smoke-secrets"
          mkdir -p "$secrets_dir"
          chmod 700 "$secrets_dir"
          generate_postgres_tls

          postgres_password="$(generate_secret)"
          postgres_application_password="$(generate_secret)"
          accounts_api_key="$(generate_secret)"
          accounts_api_key_hash="$(printf '%s' "$accounts_api_key" | sha256sum | awk '{print $1}')"
          accounts_migration_connection_string="Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${postgres_password};SSL Mode=VerifyFull;Root Certificate=/run/secrets/postgres_ca_certificate;Trust Server Certificate=false"
          accounts_application_connection_string="Host=db;Port=5432;Database=${POSTGRES_DB};Username=accounts_api;Password=${postgres_application_password};SSL Mode=VerifyFull;Root Certificate=/run/secrets/postgres_ca_certificate;Trust Server Certificate=false"
          bootstrap_owner_password="$(generate_bootstrap_owner_password)"

          write_secret_file POSTGRES_PASSWORD_FILE postgres_password "$postgres_password"
          write_secret_file POSTGRES_APPLICATION_PASSWORD_FILE postgres_application_password "$postgres_application_password"
          write_secret_file ACCOUNTS_MIGRATION_CONNECTION_STRING_FILE accounts_migration_connection_string "$accounts_migration_connection_string"
          write_secret_file ACCOUNTS_APPLICATION_CONNECTION_STRING_FILE accounts_application_connection_string "$accounts_application_connection_string"
          write_secret_file AUTH_SESSION_SIGNING_KEY_FILE auth_session_signing_key "$(generate_secret)"
          write_secret_file AUDIT_INTEGRITY_SIGNING_KEY_FILE audit_integrity_signing_key "$(generate_secret)"
          write_secret_file DATABASE_TENANT_CONTEXT_KEY_FILE database_tenant_context_key "$(generate_secret)"
          write_secret_file IDENTITY_HMAC_KEY_FILE identity_hmac_key "$(generate_secret)"
          write_secret_file MFA_ENCRYPTION_KEY_FILE mfa_encryption_key "$(generate_secret | head -c 44)"
          write_secret_file DEADLINE_PROVIDER_TOKEN_FILE deadline_provider_token "$(generate_secret)"
          write_secret_file ACCOUNTS_API_KEY_FILE accounts_api_key "$accounts_api_key"
          write_secret_file BOOTSTRAP_OWNER_PASSWORD_FILE bootstrap_owner_password "$bootstrap_owner_password"
          set_masked_env ACCOUNTS_API_KEY_HASH "$accounts_api_key_hash"

          printf 'AUDIT_INTEGRITY_ACTIVE_KEY_ID=ci-audit-%s-%s\n' "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" >> "$GITHUB_ENV"

      - name: Set up Node for visual smoke
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies for visual smoke
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Verify visual contrast policy in Chromium
        working-directory: frontend
        run: node --test tests/browser/visual-smoke-contrast.test.mjs

      - name: Determine container promotion mode
        id: promotion-mode
        shell: bash
        run: |
          set -euo pipefail

          repository="${GITHUB_REPOSITORY,,}"
          promotion_enabled=false
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            promotion_enabled=true
          fi

          evidence_dir="$RUNNER_TEMP/accounts-container-supply-chain"
          mkdir -p "$evidence_dir"
          printf 'enabled=%s\n' "$promotion_enabled" >> "$GITHUB_OUTPUT"
          printf 'backend-name=ghcr.io/%s-api\n' "$repository" >> "$GITHUB_OUTPUT"
          printf 'frontend-name=ghcr.io/%s-frontend\n' "$repository" >> "$GITHUB_OUTPUT"
          printf 'evidence-dir=%s\n' "$evidence_dir" >> "$GITHUB_OUTPUT"
          printf 'CONTAINER_PROMOTION_MODE=%s\n' "$([[ "$promotion_enabled" == "true" ]] && echo promoted || echo verification-only)" >> "$GITHUB_ENV"

      - name: Log in to GHCR for trusted promotion
        if: steps.promotion-mode.outputs.enabled == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build backend image exactly once
        id: backend-build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.backend
          push: ${{ steps.promotion-mode.outputs.enabled == 'true' }}
          load: ${{ steps.promotion-mode.outputs.enabled != 'true' }}
          provenance: false
          tags: ${{ steps.promotion-mode.outputs.enabled == 'true' && format('{0}:{1}', steps.promotion-mode.outputs.backend-name, github.sha) || format('accounts-api-ci:{0}', github.sha) }}

      - name: Build frontend image exactly once
        id: frontend-build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.frontend
          build-args: API_URL=http://api:8080
          push: ${{ steps.promotion-mode.outputs.enabled == 'true' }}
          load: ${{ steps.promotion-mode.outputs.enabled != 'true' }}
          provenance: false
          tags: ${{ steps.promotion-mode.outputs.enabled == 'true' && format('{0}:{1}', steps.promotion-mode.outputs.frontend-name, github.sha) || format('accounts-frontend-ci:{0}', github.sha) }}

      - name: Resolve exact built image references
        id: image-refs
        shell: bash
        run: |
          set -euo pipefail

          backend_digest='${{ steps.backend-build.outputs.digest }}'
          frontend_digest='${{ steps.frontend-build.outputs.digest }}'
          digest_pattern='^sha256:[0-9a-f]{64}$'
          [[ "$backend_digest" =~ $digest_pattern ]] || { echo "Invalid backend digest: $backend_digest" >&2; exit 1; }
          [[ "$frontend_digest" =~ $digest_pattern ]] || { echo "Invalid frontend digest: $frontend_digest" >&2; exit 1; }

          if [[ '${{ steps.promotion-mode.outputs.enabled }}' == 'true' ]]; then
            backend_ref='${{ steps.promotion-mode.outputs.backend-name }}'@"$backend_digest"
            frontend_ref='${{ steps.promotion-mode.outputs.frontend-name }}'@"$frontend_digest"
          else
            backend_ref="accounts-api-ci:$GITHUB_SHA"
            frontend_ref="accounts-frontend-ci:$GITHUB_SHA"
          fi

          printf 'backend-digest=%s\nfrontend-digest=%s\n' "$backend_digest" "$frontend_digest" >> "$GITHUB_OUTPUT"
          printf 'backend-ref=%s\nfrontend-ref=%s\n' "$backend_ref" "$frontend_ref" >> "$GITHUB_OUTPUT"
          printf 'ACCOUNTS_API_IMAGE=%s\nACCOUNTS_FRONTEND_IMAGE=%s\n' "$backend_ref" "$frontend_ref" >> "$GITHUB_ENV"
          printf 'BACKEND_IMAGE_DIGEST=%s\nFRONTEND_IMAGE_DIGEST=%s\n' "$backend_digest" "$frontend_digest" >> "$GITHUB_ENV"

      - name: Scan exact backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image-refs.outputs.backend-ref }}
          format: json
          output: ${{ steps.promotion-mode.outputs.evidence-dir }}/backend-trivy.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"

      - name: Scan exact frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image-refs.outputs.frontend-ref }}
          format: json
          output: ${{ steps.promotion-mode.outputs.evidence-dir }}/frontend-trivy.json
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"

      - name: Generate backend SPDX SBOM
        uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0
        with:
          image: ${{ steps.image-refs.outputs.backend-ref }}
          format: spdx-json
          output-file: ${{ steps.promotion-mode.outputs.evidence-dir }}/backend-sbom.spdx.json
          upload-artifact: false

      - name: Generate frontend SPDX SBOM
        uses: anchore/sbom-action@43a17d6e7add2b5535efe4dcae9952337c479a93 # v0
        with:
          image: ${{ steps.image-refs.outputs.frontend-ref }}
          format: spdx-json
          output-file: ${{ steps.promotion-mode.outputs.evidence-dir }}/frontend-sbom.spdx.json
          upload-artifact: false

      - name: Attest backend build provenance
        id: backend-attest
        if: steps.promotion-mode.outputs.enabled == 'true'
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ${{ steps.promotion-mode.outputs.backend-name }}
          subject-digest: ${{ steps.image-refs.outputs.backend-digest }}
          push-to-registry: true

      - name: Attest frontend build provenance
        id: frontend-attest
        if: steps.promotion-mode.outputs.enabled == 'true'
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ${{ steps.promotion-mode.outputs.frontend-name }}
          subject-digest: ${{ steps.image-refs.outputs.frontend-digest }}
          push-to-registry: true

      - name: Retain provenance bundle metadata
        shell: bash
        run: |
          set -euo pipefail
          evidence_dir='${{ steps.promotion-mode.outputs.evidence-dir }}'
          backend_bundle='${{ steps.backend-attest.outputs.bundle-path }}'
          frontend_bundle='${{ steps.frontend-attest.outputs.bundle-path }}'

          if [[ '${{ steps.promotion-mode.outputs.enabled }}' == 'true' ]]; then
            test -s "$backend_bundle"
            test -s "$frontend_bundle"
            cp "$backend_bundle" "$evidence_dir/backend-provenance.jsonl"
            cp "$frontend_bundle" "$evidence_dir/frontend-provenance.jsonl"
          fi

          printf 'BACKEND_ATTESTATION_URL=%s\n' '${{ steps.backend-attest.outputs.attestation-url }}' >> "$GITHUB_ENV"
          printf 'FRONTEND_ATTESTATION_URL=%s\n' '${{ steps.frontend-attest.outputs.attestation-url }}' >> "$GITHUB_ENV"
          printf 'BACKEND_PROVENANCE_PATH=%s\n' "$([[ -f "$evidence_dir/backend-provenance.jsonl" ]] && echo "$evidence_dir/backend-provenance.jsonl" || true)" >> "$GITHUB_ENV"
          printf 'FRONTEND_PROVENANCE_PATH=%s\n' "$([[ -f "$evidence_dir/frontend-provenance.jsonl" ]] && echo "$evidence_dir/frontend-provenance.jsonl" || true)" >> "$GITHUB_ENV"

      - name: Pull exact promoted image digests
        if: steps.promotion-mode.outputs.enabled == 'true'
        run: |
          docker pull "$ACCOUNTS_API_IMAGE"
          docker pull "$ACCOUNTS_FRONTEND_IMAGE"

      - name: Start production stack
        run: docker compose -f compose.production.yml up -d --wait --wait-timeout 300

      - name: Verify certificate-validated PostgreSQL transport
        shell: pwsh
        run: |
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          ./scripts/verify-postgres-tls.ps1 `
            -EvidencePath (Join-Path $env:RUNNER_TEMP "accounts-postgres-tls/postgres-tls-report.json") `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl $runUrl

      - name: Map local HTTPS smoke hostname
        run: echo "127.0.0.1 accounts-smoke.local" | sudo tee -a /etc/hosts

      - name: Start Caddy HTTPS smoke ingress
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .tmp/production-smoke-caddy/data .tmp/production-smoke-caddy/config
          frontend_container="$(docker compose -f compose.production.yml ps -q frontend)"
          frontend_network="$(docker inspect --format '{{range $name, $_ := .NetworkSettings.Networks}}{{$name}}{{end}}' "$frontend_container")"
          test -n "$frontend_network"
          docker create \
            --name accounts-production-smoke-ingress \
            --network bridge \
            -p 127.0.0.1:80:80 \
            -p 127.0.0.1:443:443 \
            -v "${{ github.workspace }}/deploy/caddy/Caddyfile.example:/etc/caddy/Caddyfile:ro" \
            -v "${{ github.workspace }}/.tmp/production-smoke-caddy/data:/data" \
            -v "${{ github.workspace }}/.tmp/production-smoke-caddy/config:/config" \
            -e ACCOUNTS_HOSTNAME=accounts-smoke.local \
            -e ACCOUNTS_FRONTEND_UPSTREAM=frontend:3000 \
            -e ACCOUNTS_CADDY_GLOBAL_OPTIONS=local_certs \
            caddy:2@sha256:af5fdcd76f2db5e4e974ee92f96ee8c0fc3edb55bd4ba5032547cbf3f65e486d
          docker network connect "$frontend_network" accounts-production-smoke-ingress
          docker start accounts-production-smoke-ingress

          caddy_probe=(--noproxy '*' --resolve accounts-smoke.local:443:127.0.0.1)
          for attempt in {1..30}; do
            if curl "${caddy_probe[@]}" -kfsS https://accounts-smoke.local/health/ready >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              curl "${caddy_probe[@]}" -kv https://accounts-smoke.local/health/ready || true
              docker logs accounts-production-smoke-ingress
              exit 1
            fi
            sleep 1
          done

          # Caddy stores its local CA under a root-owned 0700 dir that the
          # non-root runner cannot traverse on the host mount. Read it from the
          # container (root) instead, waiting for the CA to be issued.
          for attempt in {1..30}; do
            if docker exec accounts-production-smoke-ingress test -f /data/caddy/pki/authorities/local/root.crt; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Caddy local CA root.crt was not created" >&2
              docker exec accounts-production-smoke-ingress ls -laR /data/caddy/pki 2>&1 | head -40 || true
              docker logs accounts-production-smoke-ingress
              exit 1
            fi
            sleep 1
          done
          docker exec accounts-production-smoke-ingress cat /data/caddy/pki/authorities/local/root.crt > .tmp/production-smoke-caddy/caddy-local-root.crt
          test -s .tmp/production-smoke-caddy/caddy-local-root.crt

      - name: Trust Caddy local CA
        shell: bash
        run: |
          set -euo pipefail

          sudo cp .tmp/production-smoke-caddy/caddy-local-root.crt /usr/local/share/ca-certificates/accounts-production-smoke-caddy.crt
          sudo update-ca-certificates
          curl --noproxy '*' --resolve accounts-smoke.local:443:127.0.0.1 \
            --fail --silent --show-error https://accounts-smoke.local/health/ready >/dev/null

      - name: Run production smoke script
        shell: pwsh
        run: |
          $bootstrapOwnerPassword = (Get-Content -LiteralPath $env:BOOTSTRAP_OWNER_PASSWORD_FILE -Raw).TrimEnd("`r", "`n")
          ./scripts/smoke-production.ps1 `
            -BaseUrl https://accounts-smoke.local `
            -Email $env:BOOTSTRAP_OWNER_EMAIL `
            -Password $bootstrapOwnerPassword `
            -OutputDirectory (Join-Path $env:RUNNER_TEMP "accounts-smoke") `
            -CheckMonitoringErrorRouting

      - name: Run bounded production capacity profile
        shell: bash
        run: |
          set -euo pipefail
          node scripts/run-capacity-profile.mjs \
            --base-url=https://accounts-smoke.local \
            --report-path="$RUNNER_TEMP/accounts-capacity/capacity-profile-report.json" \
            --requests=120 \
            --concurrency=12 \
            --p95-ms=1000 \
            --max-error-rate-percent=0 \
            --min-throughput-rps=10 \
            --commit-sha="$GITHUB_SHA" \
            --github-actions-run-url="https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Upload bounded capacity evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bounded-capacity-profile
          path: ${{ runner.temp }}/accounts-capacity/capacity-profile-report.json
          if-no-files-found: error
          retention-days: 90

      - name: Exercise API and database interruption recovery
        shell: pwsh
        run: |
          ./scripts/test-production-failover.ps1 `
            -BaseUrl https://accounts-smoke.local `
            -ComposeFile compose.production.yml `
            -EvidencePath (Join-Path $env:RUNNER_TEMP "accounts-failover/production-failover-report.json") `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID" `
            -ConfirmEphemeralCandidateStack `
            -ExpectedComposeProject accounts-production

      - name: Upload failover drill evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-failover-drill
          path: ${{ runner.temp }}/accounts-failover/production-failover-report.json
          if-no-files-found: error
          retention-days: 90

      - name: Verify no-direct filing submission control
        shell: pwsh
        run: |
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          ./scripts/verify-no-direct-filing-submission.ps1 `
            -EvidencePath (Join-Path $env:RUNNER_TEMP "accounts-smoke/no-direct-filing-submission-report.json") `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl $runUrl

      - name: Verify production readiness report
        shell: pwsh
        run: |
          ./scripts/verify-production-readiness-report.ps1 `
            -ReportPath (Join-Path $env:RUNNER_TEMP "accounts-smoke/production-readiness-report.json") `
            -EvidencePath (Join-Path $env:RUNNER_TEMP "accounts-smoke/production-readiness-verification-report.json")

      - name: Write and verify container supply-chain evidence
        shell: pwsh
        run: |
          $evidenceDirectory = '${{ steps.promotion-mode.outputs.evidence-dir }}'
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $evidencePath = Join-Path $evidenceDirectory "container-supply-chain-report.json"
          $verificationPath = Join-Path $evidenceDirectory "container-supply-chain-verification-report.json"

          ./scripts/write-container-supply-chain-report.ps1 `
            -PromotionMode $env:CONTAINER_PROMOTION_MODE `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl $runUrl `
            -BackendImageName '${{ steps.promotion-mode.outputs.backend-name }}' `
            -BackendImageReference $env:ACCOUNTS_API_IMAGE `
            -BackendDigest $env:BACKEND_IMAGE_DIGEST `
            -FrontendImageName '${{ steps.promotion-mode.outputs.frontend-name }}' `
            -FrontendImageReference $env:ACCOUNTS_FRONTEND_IMAGE `
            -FrontendDigest $env:FRONTEND_IMAGE_DIGEST `
            -BackendScanPath (Join-Path $evidenceDirectory "backend-trivy.json") `
            -FrontendScanPath (Join-Path $evidenceDirectory "frontend-trivy.json") `
            -BackendSbomPath (Join-Path $evidenceDirectory "backend-sbom.spdx.json") `
            -FrontendSbomPath (Join-Path $evidenceDirectory "frontend-sbom.spdx.json") `
            -BackendProvenancePath $env:BACKEND_PROVENANCE_PATH `
            -FrontendProvenancePath $env:FRONTEND_PROVENANCE_PATH `
            -BackendAttestationUrl $env:BACKEND_ATTESTATION_URL `
            -FrontendAttestationUrl $env:FRONTEND_ATTESTATION_URL `
            -SmokeVerified `
            -EvidencePath $evidencePath

          if ($env:CONTAINER_PROMOTION_MODE -eq "promoted") {
            ./scripts/verify-container-supply-chain-report.ps1 `
              -EvidencePath $evidencePath `
              -ReportPath $verificationPath `
              -CommitSha $env:GITHUB_SHA `
              -GitHubActionsRunUrl $runUrl
          } else {
            ./scripts/verify-container-supply-chain-report.ps1 `
              -EvidencePath $evidencePath `
              -ReportPath $verificationPath `
              -CommitSha $env:GITHUB_SHA `
              -GitHubActionsRunUrl $runUrl `
              -AllowUnpromoted
          }

      - name: Upload container supply-chain evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-supply-chain
          path: ${{ steps.promotion-mode.outputs.evidence-dir }}
          if-no-files-found: warn

      - name: Upload PostgreSQL TLS evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: postgres-tls-runtime
          path: ${{ runner.temp }}/accounts-postgres-tls/postgres-tls-report.json
          if-no-files-found: error

      - name: Upload monitoring error routing evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: monitoring-error-routing-smoke
          path: ${{ runner.temp }}/accounts-smoke/monitoring-error-routing-report.json
          if-no-files-found: ignore

      - name: Upload no-direct filing submission evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: no-direct-filing-submission-control
          path: ${{ runner.temp }}/accounts-smoke/no-direct-filing-submission-report.json
          if-no-files-found: error

      - name: Upload production readiness report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-readiness-report
          path: |
            ${{ runner.temp }}/accounts-smoke/production-readiness-report.json
            ${{ runner.temp }}/accounts-smoke/production-readiness-verification-report.json
          if-no-files-found: error

      - name: Capture structured API log sample
        shell: pwsh
        run: |
          $logDir = Join-Path $env:RUNNER_TEMP "accounts-logs"
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          $logPath = Join-Path $logDir "api-structured.log"
          docker compose -f compose.production.yml logs --no-color --no-log-prefix api | Set-Content -LiteralPath $logPath -Encoding UTF8
          ./scripts/verify-structured-logs.ps1 `
            -LogPath $logPath `
            -MonitoringEvidencePath (Join-Path $env:RUNNER_TEMP "accounts-smoke/monitoring-error-routing-report.json") `
            -EvidencePath (Join-Path $logDir "structured-log-report.json")

      - name: Upload structured API log evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: structured-json-log-sample
          path: ${{ runner.temp }}/accounts-logs
          if-no-files-found: ignore

      - name: Run visual smoke screenshots
        working-directory: frontend
        shell: bash
        run: |
          set -euo pipefail

          export BASE_URL=https://accounts-smoke.local
          export EMAIL="$BOOTSTRAP_OWNER_EMAIL"
          export PASSWORD="$(tr -d '\r\n' < "$BOOTSTRAP_OWNER_PASSWORD_FILE")"

          npm run test:visual -- --output-dir=../.tmp/visual-smoke
          npm run test:visual:verify -- --manifest=../.tmp/visual-smoke/visual-smoke-manifest.json --report-path=../.tmp/visual-smoke/visual-smoke-evidence-report.json
          npm run test:visual:workbench -- --visual-report=../.tmp/visual-smoke/visual-smoke-evidence-report.json --report-path=../.tmp/visual-smoke/accountant-workbench-evidence-report.json

      - name: Upload visual smoke screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: visual-smoke-screenshots
          path: .tmp/visual-smoke
          if-no-files-found: ignore

      - name: Run production backup restore drill
        shell: pwsh
        run: |
          $backupDir = Join-Path $env:RUNNER_TEMP "accounts-backups"
          New-Item -ItemType Directory -Force -Path $backupDir | Out-Null

          ./scripts/backup-postgres.ps1 `
            -OutputDirectory $backupDir

          $backups = @(Get-ChildItem -LiteralPath $backupDir -Filter "*.dump.cms" |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object)
          if ($backups.Count -ne 1) {
            throw "Expected exactly one backup dump in $backupDir, found $($backups.Count)."
          }

          $backup = $backups[0]
          if (-not (Test-Path -LiteralPath "$($backup.FullName).sha256")) {
            throw "Missing sha256 for $($backup.FullName)."
          }
          if (-not (Test-Path -LiteralPath "$($backup.FullName).manifest.json")) {
            throw "Missing encrypted backup manifest for $($backup.FullName)."
          }
          if (@(Get-ChildItem -LiteralPath $backupDir -Filter "*.dump").Count -ne 0) {
            throw "Plaintext PostgreSQL dumps must not remain in the retained backup artifact directory."
          }

          $restoreEvidencePath = Join-Path $backupDir "restore-drill-report.json"
          ./scripts/verify-postgres-backup.ps1 `
            -BackupPath $backup.FullName `
            -EvidencePath $restoreEvidencePath

      - name: Upload backup restore drill evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: postgres-backup-restore-drill
          path: ${{ runner.temp }}/accounts-backups
          if-no-files-found: error
          retention-days: 90

      - name: Show production stack diagnostics
        if: failure()
        run: |
          docker compose -f compose.production.yml ps
          docker compose -f compose.production.yml logs --no-color --tail=200
          docker logs accounts-production-smoke-ingress 2>/dev/null || true
          echo "=== frontend /health/ready (published port) ==="
          curl -s -i --max-time 10 "http://127.0.0.1:${FRONTEND_PORT:-3000}/health/ready" || true
          echo ""
          echo "=== api /api/companies with service key (from frontend container) ==="
          docker compose -f compose.production.yml exec -T frontend sh -c 'wget -S -O- --header="X-Accounts-Api-Key: $(cat /run/secrets/accounts_api_key)" http://api:8080/api/companies 2>&1' || true
          echo ""

      - name: Stop production stack
        if: always()
        run: |
          docker rm -f accounts-production-smoke-ingress >/dev/null 2>&1 || true
          docker compose -f compose.production.yml down -v --remove-orphans

  ci-machine-evidence-pack:
    name: CI Machine Evidence Pack
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - production-config
      - production-smoke
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download machine evidence artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: ${{ runner.temp }}/accounts-ci-machine-evidence
          pattern: "!*.dockerbuild"

      - name: Verify CI machine evidence pack
        shell: pwsh
        run: |
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          ./scripts/verify-ci-machine-evidence-pack.ps1 `
            -EvidenceDirectory (Join-Path $env:RUNNER_TEMP "accounts-ci-machine-evidence") `
            -ReportPath (Join-Path $env:RUNNER_TEMP "accounts-ci-machine-evidence-pack/ci-machine-evidence-pack-report.json") `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl $runUrl

      - name: Prepare release evidence reviewer workspace
        shell: pwsh
        run: |
          $runUrl = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $machineEvidenceRoot = Join-Path $env:RUNNER_TEMP "accounts-ci-machine-evidence"
          $workspaceRoot = Join-Path $env:RUNNER_TEMP "accounts-release-evidence-workspace"
          ./scripts/new-release-evidence-workspace.ps1 `
            -OutputDirectory $workspaceRoot `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl $runUrl `
            -ProductionReadinessReportPath (Join-Path $machineEvidenceRoot "production-readiness-report/production-readiness-report.json") `
            -ProductionReadinessVerificationReportPath (Join-Path $machineEvidenceRoot "production-readiness-report/production-readiness-verification-report.json") `
            -VisualSmokeEvidenceReportPath (Join-Path $machineEvidenceRoot "visual-smoke-screenshots/visual-smoke-evidence-report.json") `
            -MonitoringErrorRoutingReportPath (Join-Path $machineEvidenceRoot "monitoring-error-routing-smoke/monitoring-error-routing-report.json") `
            -StructuredLogReportPath (Join-Path $machineEvidenceRoot "structured-json-log-sample/structured-log-report.json")

          ./scripts/verify-release-evidence-workspace.ps1 `
            -WorkspaceDirectory $workspaceRoot `
            -ReportPath (Join-Path $workspaceRoot "release-evidence-report.json") `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl $runUrl

          ./scripts/verify-ci-machine-evidence-pack.ps1 `
            -EvidenceDirectory $machineEvidenceRoot `
            -ReportPath (Join-Path $env:RUNNER_TEMP "accounts-ci-machine-evidence-pack/ci-machine-evidence-pack-report.json") `
            -CommitSha $env:GITHUB_SHA `
            -GitHubActionsRunUrl $runUrl `
            -ReviewerWorkspaceDirectory $workspaceRoot

      - name: Upload CI machine evidence pack report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-machine-evidence-pack
          path: ${{ runner.temp }}/accounts-ci-machine-evidence-pack/ci-machine-evidence-pack-report.json
          if-no-files-found: error

      - name: Upload release evidence reviewer workspace
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-evidence-reviewer-workspace
          path: ${{ runner.temp }}/accounts-release-evidence-workspace
          if-no-files-found: error
