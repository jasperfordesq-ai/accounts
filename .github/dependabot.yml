version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Europe/Dublin
    open-pull-requests-limit: 10
    groups:
      production-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
      development-minor-patch:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: nuget
    directory: /backend/Accounts.Api
    schedule:
      interval: weekly
      day: monday
      time: "05:25"
      timezone: Europe/Dublin
    open-pull-requests-limit: 10
    groups:
      api-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: nuget
    directory: /backend/Accounts.Tests
    schedule:
      interval: weekly
      day: monday
      time: "05:35"
      timezone: Europe/Dublin
    open-pull-requests-limit: 10
    groups:
      test-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:45"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:55"
      timezone: Europe/Dublin
    open-pull-requests-limit: 5
