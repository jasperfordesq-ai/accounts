services:
  db:
    image: postgres:16.4-alpine
    container_name: accounts-db
    environment:
      POSTGRES_DB: accounts
      POSTGRES_USER: accounts
      POSTGRES_PASSWORD: accounts_dev
    ports:
      - "5433:5432"
    volumes:
      - accounts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounts -d accounts"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend/Accounts.Api
      dockerfile: ../../Dockerfile.backend
    container_name: accounts-api
    ports:
      - "5090:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=accounts;Username=accounts;Password=accounts_dev"
      DatabaseStartup__AutoMigrateOnStartup: "true"
      DatabaseStartup__SeedDemoData: "true"
      AllowedOrigins__0: "http://localhost:5173"
      AllowedOrigins__1: "http://localhost:5174"
      AllowedOrigins__2: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: accounts-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8080"
    depends_on:
      - api

volumes:
  accounts_data:
